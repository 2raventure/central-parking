  { id: 'ene_surface', phase: 'ene', levier: 'ene', type: 'radio', title: 'Quelle est la surface approximative du parking ?', sub: 'Détermine l\'éligibilité à l\'obligation de solarisation (loi AGEC).',  options: [ { val: 'petit', label: '< 500 m²', desc: 'Pas d\'obligation légale' }, { val: 'moyen', label: '500-1 500 m²', desc: '' }, { val: 'grand', label: '> 1 500 m²', desc: 'Obligation de solarisation à partir de 2026' } ] },
  { id: 'ene_chauffage', phase: 'ene', levier: 'ene', type: 'radio', title: 'Mode de chauffage actuel du bâtiment ?', sub: '', options: [ { val: 'gaz_fioul', label: 'Gaz ou fioul', desc: 'Transition PAC envisageable' }, { val: 'elec', label: 'Électrique', desc: '' }, { val: 'rcu', label: 'Réseau de chaleur (RCU)', desc: 'PAC peu pertinente' }, { val: 'inconnu', label: 'Inconnu', desc: '' } ] },
  { id: 'cons_plu', phase: 'cons', levier: 'cons', type: 'radio', title: 'Le PLU permet-il des constructions sur la zone ?', sub: 'À vérifier en mairie ou géoportail urbanisme.', options: [ { val: 'oui', label: 'Oui', desc: '' }, { val: 'non', label: 'Non', desc: '' }, { val: 'inconnu', label: 'À vérifier', desc: '' } ] },
  { id: 'cons_besoin', phase: 'cons', levier: 'cons', type: 'radio', title: 'Quel besoin principal pour un module construit ?', sub: '', options: [ { val: 'logement', label: 'Logements supplémentaires', desc: '' }, { val: 'communautaire', label: 'Espace collectif (salle, AMAP...)', desc: '' }, { val: 'test', label: 'Test / occupation temporaire', desc: '' } ] }
];

let state = { answers: {}, step: 0, mode: 'questionnaire' };

function getVisibleQuestions() {
  const sel = state.answers.levier || [];
  return QUESTIONS.filter(q => {
    if (!q.levier) return true;
    return sel.includes(q.levier);
  });
}

function computeScore() {
  const a = state.answers;
  const leviers = a.levier || [];
  const scores = {};
  FICHES.forEach(f => { scores[f.id] = 0; });

  FICHES.forEach(f => {
    if (!leviers.includes(f.levier)) return;
    let s = 10;
    const k = f.keys || [];
    if (a.temporaire === 'oui' && k.includes('temporaire')) s += 5;
    if (a.budget === 'faible' && k.includes('budget_faible')) s += 4;
    if (a.budget === 'moyen' && k.includes('budget_moyen')) s += 3;
    if ((a.budget === 'eleve' || a.budget === 'inconnu') && k.includes('budget_eleve')) s += 3;
    if (a.lien_social === 'fort' && k.includes('lien_social')) s += 5;
    if (a.mob_velo === 'oui' && k.includes('velo')) s += 4;
    if (a.mob_veh_elec === 'oui' && k.includes('veh_elec')) s += 5;
    if (a.mob_ouverture === 'oui' && k.includes('partage')) s += 4;
    if (a.ene_surface === 'grand' && k.includes('obligation_solaire')) s += 5;
    if (a.cons_plu === 'oui' && k.includes('plu')) s += 4;
    if (a.cons_besoin === 'logement' && k.includes('logement')) s += 5;
    if (a.cons_besoin === 'communautaire' && k.includes('communautaire')) s += 5;
    if (a.veg_pollution === 'oui' && f.levier === 'veg' && !k.includes('temporaire')) s -= 4;
    scores[f.id] = s;
  });
  return scores;
}

function getRecommended() {
  const scores = computeScore();
  return FICHES
    .filter(f => (state.answers.levier || []).includes(f.levier))
    .sort((a, b) => scores[b.id] - scores[a.id]);
}

function render() {
  const app = document.getElementById('app');
  if (state.mode === 'results') { renderResults(app); return; }
  const qs = getVisibleQuestions();
  const q = qs[state.step];
  if (!q) { state.mode = 'results'; renderResults(app); return; }
  const pct = Math.round((state.step / qs.length) * 100);
  let phaseLabel = q.phase === 'intro' ? 'Cadrage général' : q.phase === 'generique' ? 'Contexte projet' : LEVIERS[q.phase]?.label || '';
  let levierColor = q.levier ? LEVIERS[q.levier].color : 'teal';
  let bgVar = `var(--${levierColor}-light)`;
  let cVar = `var(--${levierColor})`;
  let html = `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="step-label">Question ${state.step + 1} / ${qs.length}</div>`;
  if (q.levier) {
    html += `<div class="levier-badge" style="background:${bgVar};color:${cVar}">${LEVIERS[q.levier].icon} ${LEVIERS[q.levier].label}</div>`;
  }
  html += `<div class="q-title">${q.title}</div>`;
  if (q.sub) html += `<div class="q-sub">${q.sub}</div>`;

  if (q.type === 'multi_levier') {
    const sel = state.answers.levier || [];
    html += `<div class="levier-selector">`;
    Object.entries(LEVIERS).forEach(([key, lv]) => {
      const isSel = sel.includes(key);
      html += `<div class="levier-card ${isSel ? 'sel ' + lv.className : ''}" onclick="toggleLevier('${key}')">
        <div class="lc-icon">${lv.icon}</div>
        <div class="lc-name">${lv.label}</div>
        <div class="lc-desc">${key === 'veg' ? 'Végétalisation, potager, perméabilité' : key === 'mob' ? 'Vélo, recharge, auto-partage' : key === 'ene' ? 'Solaire, PAC, transition énergétique' : 'Modules habitables ou collectifs'}</div>
      </div>`;
    });
    html += `</div>`;
  } else if (q.type === 'radio') {
    html += `<div class="options-grid">`;
    q.options.forEach(opt => {
      const isSel = state.answers[q.id] === opt.val;
      html += `<button class="opt-btn ${isSel ? 'selected' : ''}" onclick="setAnswer('${q.id}','${opt.val}')">
        <span class="opt-icon"></span>
        <span class="opt-text"><strong>${opt.label}</strong>${opt.desc ? `<span>${opt.desc}</span>` : ''}</span>
      </button>`;
    });
    html += `</div>`;
  }

  const canNext = q.type === 'multi_levier' ? (state.answers.levier || []).length > 0 : !!state.answers[q.id];
  html += `<div class="nav-row">
    ${state.step > 0 ? `<button class="btn-nav" onclick="prevStep()">← Précédent</button>` : `<span></span>`}
    <button class="btn-nav btn-next" onclick="nextStep()" ${!canNext ? 'disabled' : ''}>${state.step === qs.length - 1 ? 'Voir mes fiches actions ↗' : 'Suivant →'}</button>
  </div>`;
  app.innerHTML = html;
}

function renderResults(app) {
  const recs = getRecommended();
  const byLevier = {};
  recs.forEach(f => { if (!byLevier[f.levier]) byLevier[f.levier] = []; byLevier[f.levier].push(f); });
  const scores = computeScore();
  const leviersSel = state.answers.levier || [];

  let html = `<div class="results-header">
    <h2>Vos fiches actions</h2>
    <p>${recs.length} actions identifiées selon votre profil</p>
    <div class="score-pills">`;
  leviersSel.forEach(l => {
    const lv = LEVIERS[l];
    html += `<span class="score-pill" style="background:var(--${lv.color}-light);color:var(--${lv.color})">${lv.icon} ${lv.label} · ${(byLevier[l]||[]).length} actions</span>`;
  });
  html += `</div></div>`;

  leviersSel.forEach(l => {
    const lv = LEVIERS[l];
    const fiches = (byLevier[l] || []);
    if (!fiches.length) return;
    const top = fiches.slice(0, 3);
    const rest = fiches.slice(3);
    html += `<div class="fiche-section">
      <div class="fiche-section-title" style="color:var(--${lv.color})">${lv.icon} ${lv.label}</div>
      <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:8px;letter-spacing:0.03em">RECOMMANDÉES EN PRIORITÉ</div>
      <div class="fiches-grid">`;
    top.forEach(f => {
      html += ficheCard(f, lv);
    });
    html += `</div>`;
    if (rest.length) {
      html += `<div style="font-size:11px;color:var(--color-text-tertiary);margin:12px 0 8px;letter-spacing:0.03em">AUTRES ACTIONS POSSIBLES</div>
        <div class="fiches-grid">`;
      rest.forEach(f => { html += ficheCard(f, lv); });
      html += `</div>`;
    }
    html += `</div><hr class="section-divider">`;
  });

  html += `<button class="restart-btn" onclick="restart()">↺ Recommencer le diagnostic</button>`;
  app.innerHTML = html;
}

function ficheCard(f, lv) {
  return `<div class="fiche-card" onclick="openModal('${f.id}')">
    <div class="fiche-icon">${f.icon}</div>
    <div class="fiche-name">${f.name}</div>
    <span class="fiche-tag" style="background:var(--${lv.color}-light);color:var(--${lv.color})">${f.cout}</span>
  </div>`;
}

function openModal(id) {
  const f = FICHES.find(x => x.id === id);
  if (!f) return;
  const lv = LEVIERS[f.levier];
  const m = document.getElementById('modal');
  const mc = document.getElementById('modal-content');
  mc.innerHTML = `
    <button class="modal-close" onclick="closeModal()" aria-label="Fermer">✕</button>
    <div class="fiche-icon" style="font-size:28px;margin-bottom:8px">${f.icon}</div>
    <div class="modal-title">${f.name}</div>
    <div style="margin-bottom:10px"><span class="fiche-tag" style="background:var(--${lv.color}-light);color:var(--${lv.color})">${lv.icon} ${lv.label}</span></div>
    <div class="modal-desc">${f.desc}</div>
    <div class="modal-info-row">
      <span class="modal-info-chip">💰 ${f.cout}</span>
      <span class="modal-info-chip">⏱ ${f.duree}</span>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Acteurs clés</div>
      <ul class="modal-list">${f.acteurs.map(a => `<li>${a}</li>`).join('')}</ul>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Conditions préalables</div>
      <ul class="modal-list">${f.conditions.map(c => `<li>${c}</li>`).join('')}</ul>
    </div>
    <div style="margin-top:1.25rem">
      <button onclick="sendPrompt('Dis-m\\'en plus sur la fiche action « ${f.name} » et comment la mettre en oeuvre dans un parking résidentiel')" style="width:100%;padding:10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer;font-size:13px">Approfondir cette fiche ↗</button>
    </div>`;
  m.classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function toggleLevier(key) {
  const curr = state.answers.levier || [];
  const idx = curr.indexOf(key);
  if (idx >= 0) curr.splice(idx, 1); else curr.push(key);
  state.answers.levier = [...curr];
  render();
}

function setAnswer(id, val) {
  state.answers[id] = val;
  render();
}

function nextStep() {
  const qs = getVisibleQuestions();
  if (state.step < qs.length - 1) { state.step++; render(); }
  else { state.mode = 'results'; render(); }
}

function prevStep() {
  if (state.step > 0) { state.step--; render(); }
}

function restart() {
  state = { answers: {}, step: 0, mode: 'questionnaire' };
  render();
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

render();
</script>
